<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <defs>
    <!-- Top Face Gradient -->
    <linearGradient id="topGrad" x1="11" y1="18" x2="37" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <!-- Left Face Gradient -->
    <linearGradient id="leftGrad" x1="11" y1="27.5" x2="24" y2="27.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#3730a3" />
    </linearGradient>
    
    <!-- Right Face Gradient -->
    <linearGradient id="rightGrad" x1="24" y1="27.5" x2="37" y2="27.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <!-- Rounded Background Container -->
  <rect width="48" height="48" rx="14" fill="url(#bgGrad)" />
  <rect width="46" height="46" x="1" y="1" rx="13" stroke="#312e81" stroke-width="1.5" stroke-opacity="0.5" />

  <!-- Cube Drop Shadow -->
  <path d="M24,34 L33,39 L24,44 L15,39 Z" fill="#030712" opacity="0.6" />

  <!-- 3D Isometric Cube -->
  <!-- Top Face -->
  <path d="M24,11 L37,18 L24,25 L11,18 Z" fill="url(#topGrad)" />
  
  <!-- Left Face -->
  <path d="M11,18 L24,25 L24,37 L11,30 Z" fill="url(#leftGrad)" />
  
  <!-- Right Face -->
  <path d="M24,25 L37,18 L37,30 L24,37 Z" fill="url(#rightGrad)" />
  
  <!-- Subtle Overlay Highlight Line on Edges -->
  <path d="M11,18 L24,25 L37,18" fill="none" stroke="#e0e7ff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" />
  <path d="M24,25 L24,37" fill="none" stroke="#e0e7ff" stroke-width="1" stroke-linecap="round" opacity="0.25" />
</svg>